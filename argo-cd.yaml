apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: accommodations
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/akolovska/Accommodations-app-manifests
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: accommodations
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
